<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Harsh CSC eMitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #2a3550;
      --saffron: #e8671a;
      --saffron2: #f5a623;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --red: #ef4444;
      --green: #22c55e;
      --font: 'Space Grotesk', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .reset-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .reset-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .reset-logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--saffron), var(--saffron2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .reset-logo-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .reset-logo-text span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .reset-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .reset-sub {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 28px;
    }
    .reset-field {
      margin-bottom: 20px;
    }
    .reset-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .reset-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .reset-field input:focus {
      border-color: var(--saffron);
    }
    .reset-err {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
      display: none;
    }
    .reset-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 13px;
      color: var(--green);
      margin-bottom: 20px;
      display: none;
      line-height: 1.5;
    }
    .btn-reset {
      width: 100%;
      background: linear-gradient(135deg, var(--saffron), var(--saffron2));
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
    }
    .btn-reset:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-reset:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .back-to-login {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--saffron2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-to-login:hover {
      color: var(--saffron);
    }
  </style>
</head>
<body>

  <div class="reset-box">
    <div class="reset-logo">
      <div class="reset-logo-icon">🔑</div>
      <div class="reset-logo-text">Harsh CSC eMitra<span>Security Hub</span></div>
    </div>
    
    <div id="resetFormContainer">
      <div class="reset-title">Reset Password</div>
      <div class="reset-sub">Naya password set karein.</div>
      
      <div class="reset-err" id="resetErr"></div>
      <div class="reset-success" id="resetSuccess"></div>

      <div class="reset-field">
        <label>Naya Password (New Password)</label>
        <input id="newPass" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      
      <div class="reset-field">
        <label>Password Confirm Karein</label>
        <input id="confirmPass" type="password" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
      </div>

      <button class="btn-reset" id="btnSubmit" onclick="doReset()">Save Password →</button>
    </div>

    <a href="/admin.html" class="back-to-login">← Back to Admin Login</a>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const errBox = document.getElementById('resetErr');
    const successBox = document.getElementById('resetSuccess');
    const btnSubmit = document.getElementById('btnSubmit');

    if (!token) {
      errBox.textContent = '❌ Error: Reset token is missing. Please request a new link.';
      errBox.style.display = 'block';
      btnSubmit.disabled = true;
    }

    async function doReset() {
      if (!token) return;

      const newPass = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;

      errBox.style.display = 'none';
      successBox.style.display = 'none';

      if (!newPass || newPass.trim().length === 0) {
        errBox.textContent = '❌ Naya password likhna zaroori hai.';
        errBox.style.display = 'block';
        return;
      }

      if (newPass !== confirmPass) {
        errBox.textContent = '❌ Passwords match nahi ho rahe hain.';
        errBox.style.display = 'block';
        return;
      }

      if (newPass.length < 6) {
        errBox.textContent = '❌ Password kam se kam 6 character ka hona chahiye.';
        errBox.style.display = 'block';
        return;
      }

      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Saving...';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'reset-password', token, newPassword: newPass })
        });

        const data = await res.json();
        if (res.ok && data.success) {
          successBox.textContent = '✅ ' + data.message;
          successBox.style.display = 'block';
          
          document.getElementById('newPass').value = '';
          document.getElementById('confirmPass').value = '';

          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 3000);
        } else {
          errBox.textContent = '❌ ' + (data.error || 'Password reset fail ho gaya.');
          errBox.style.display = 'block';
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Save Password →';
        }
      } catch (e) {
        errBox.textContent = '❌ Network error: ' + e.message;
        errBox.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Save Password →';
      }
    }
  </script>
</body>
</html>
