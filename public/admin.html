<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel — Harsh CSC eMitra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#0B1F4B; --navy2:#0f2454; --navy3:#1c3a80;
    --saffron:#E8671A; --gold:#F5A623;
    --white:#FFFFFF; --slate:#94a3b8; --light:#1e3a6e;
    --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
    --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  }
  body { font-family:var(--font); background:#060f24; color:var(--white); min-height:100vh; overflow-x:hidden; }

  /* ── LOGIN ── */
  #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(232,103,26,0.18) 0%,transparent 65%); }
  .login-box { background:rgba(11,31,75,0.85); border:1px solid rgba(232,103,26,0.25); border-radius:22px;
    padding:40px 36px; width:100%; max-width:420px; text-align:center; backdrop-filter:blur(12px); }
  .login-logo { width:64px; height:64px; border-radius:14px; background:linear-gradient(135deg,var(--saffron),var(--gold));
    display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:900; margin:0 auto 18px; }
  .login-box h1 { font-size:22px; font-weight:700; color:var(--white); margin-bottom:5px; }
  .login-box .login-sub { font-size:13px; color:var(--slate); margin-bottom:28px; }
  .input-group { margin-bottom:16px; text-align:left; }
  .input-group label { display:block; font-size:11px; font-weight:700; color:var(--slate); text-transform:uppercase;
    letter-spacing:0.1em; margin-bottom:6px; }
  .form-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:10px;
    padding:12px 14px; font-size:14px; font-family:var(--font); color:var(--white); outline:none; transition:border-color .2s; }
  .form-input:focus { border-color:var(--saffron); background:rgba(255,255,255,0.09); }
  .form-input::placeholder { color:rgba(255,255,255,0.28); }
  .btn-login { width:100%; background:var(--saffron); color:var(--white); border:none; padding:13px;
    border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:var(--font); transition:all .2s; margin-top:8px; }
  .btn-login:hover { background:#d05a14; }
  .btn-login:disabled { opacity:.6; cursor:not-allowed; }
  .login-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px;
    padding:10px 14px; font-size:13px; color:#fca5a5; margin-top:14px; display:none; }

  /* ── ADMIN PANEL ── */
  #adminPanel { display:none; }

  .admin-header { background:rgba(11,31,75,0.98); border-bottom:1px solid rgba(232,103,26,0.2); padding:12px 24px;
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; backdrop-filter:blur(14px); }
  .admin-brand { display:flex; align-items:center; gap:10px; }
  .admin-logo-sm { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,var(--saffron),var(--gold));
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; flex-shrink:0; }
  .admin-title { font-size:16px; font-weight:700; color:var(--white); }
  .admin-title .live { font-size:11px; color:var(--slate); font-weight:400; margin-left:10px; display:inline-flex; align-items:center; gap:4px; }
  .realtime-dot { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; animation:blink 2s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .admin-header-right { display:flex; align-items:center; gap:10px; }
  .admin-user { font-size:12px; color:var(--slate); }
  .btn-sm { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.8);
    padding:7px 13px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--font);
    transition:all .2s; text-decoration:none; display:inline-block; }
  .btn-sm:hover { background:rgba(255,255,255,0.13); color:var(--white); }
  .btn-sm.danger:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.3); color:#fca5a5; }

  .admin-main { max-width:1440px; margin:0 auto; padding:24px; }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:24px; }
  .stat-card { background:rgba(11,31,75,0.7); border:1px solid rgba(255,255,255,0.07); border-radius:14px;
    padding:18px 20px; display:flex; align-items:center; gap:14px; transition:border-color .2s; }
  .stat-card:hover { border-color:rgba(232,103,26,0.25); }
  .stat-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .stat-val { font-size:22px; font-weight:800; color:var(--white); line-height:1; margin-bottom:4px; font-family:var(--mono); }
  .stat-lbl { font-size:10px; color:var(--slate); font-weight:600; text-transform:uppercase; letter-spacing:0.09em; }

  /* Toolbar */
  .toolbar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
  .search-input { flex:1; min-width:200px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    border-radius:10px; padding:10px 14px; font-size:14px; font-family:var(--font); color:var(--white); outline:none; transition:border-color .2s; }
  .search-input:focus { border-color:var(--saffron); }
  .search-input::placeholder { color:rgba(255,255,255,0.28); }
  .filter-select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px;
    padding:10px 14px; font-size:13px; font-family:var(--font); color:var(--white); outline:none; cursor:pointer; }
  .filter-select option { background:#0B1F4B; color:var(--white); }
  .btn-action { background:var(--saffron); color:var(--white); border:none; padding:10px 16px; border-radius:10px;
    font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font); transition:all .2s; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn-action:hover { background:#d05a14; }
  .btn-action.ghost { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); }
  .btn-action.ghost:hover { background:rgba(255,255,255,0.13); }

  /* Table */
  .table-wrap { background:rgba(11,31,75,0.55); border:1px solid rgba(255,255,255,0.07); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead th { background:rgba(255,255,255,0.04); padding:11px 15px; font-size:11px; font-weight:700; color:var(--slate);
    text-transform:uppercase; letter-spacing:0.09em; text-align:left; border-bottom:1px solid rgba(255,255,255,0.07); white-space:nowrap; }
  tbody tr { border-bottom:1px solid rgba(255,255,255,0.05); transition:background .15s; cursor:pointer; }
  tbody tr:hover { background:rgba(232,103,26,0.07); }
  tbody tr:last-child { border-bottom:none; }
  td { padding:12px 15px; font-size:13px; color:rgba(255,255,255,0.85); vertical-align:middle; }
  .td-ref { font-family:var(--mono); font-size:11.5px; color:var(--gold); font-weight:700; }
  .td-name { font-weight:600; white-space:nowrap; }
  .td-phone a { color:var(--slate); text-decoration:none; transition:color .2s; }
  .td-phone a:hover { color:var(--green); }
  .td-amount { font-family:var(--mono); font-weight:700; color:var(--gold); white-space:nowrap; }
  .td-items { max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; color:rgba(255,255,255,0.55); }
  .td-date { color:var(--slate); font-size:11.5px; white-space:nowrap; }
  .action-btns { display:flex; gap:5px; }
  .btn-icon { width:28px; height:28px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:transparent;
    color:var(--slate); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all .2s; }
  .btn-icon:hover { background:rgba(255,255,255,0.09); color:var(--white); }
  .btn-icon.wa:hover { background:rgba(34,197,94,0.15); color:var(--green); border-color:rgba(34,197,94,0.3); }

  /* Status badges */
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px;
    font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }
  .badge-new        { background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.25); }
  .badge-processing { background:rgba(232,103,26,0.15); color:var(--saffron); border:1px solid rgba(232,103,26,0.3); }
  .badge-completed  { background:rgba(34,197,94,0.12); color:#4ade80; border:1px solid rgba(34,197,94,0.25); }
  .badge-cancelled  { background:rgba(239,68,68,0.12); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }

  .table-state { text-align:center; padding:56px 20px; color:var(--slate); }
  .table-state .state-icon { font-size:38px; margin-bottom:12px; }
  .table-state p { font-size:14px; }

  /* ── ORDER DETAIL MODAL ── */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center;
    justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-bg.open { opacity:1; pointer-events:all; }
  .modal-box { background:#0f2454; border:1px solid rgba(255,255,255,0.1); border-radius:20px; width:100%;
    max-width:600px; max-height:92vh; overflow-y:auto; box-shadow:0 32px 80px rgba(0,0,0,0.55);
    animation:slideUp .28s ease; }
  @keyframes slideUp { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-head { padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between;
    align-items:center; position:sticky; top:0; background:#0f2454; z-index:1; border-radius:20px 20px 0 0; }
  .modal-ref-text { font-family:var(--mono); font-size:12px; color:var(--gold); font-weight:700; margin-bottom:3px; }
  .modal-title-text { font-size:18px; font-weight:700; color:var(--white); }
  .close-btn { width:30px; height:30px; border-radius:7px; border:1px solid rgba(255,255,255,0.12); background:transparent;
    cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; color:var(--slate); transition:all .2s; }
  .close-btn:hover { background:rgba(255,255,255,0.08); color:var(--white); }
  .modal-body { padding:22px 24px; }
  .detail-sec { margin-bottom:22px; }
  .detail-sec-title { font-size:11px; font-weight:700; color:var(--slate); text-transform:uppercase; letter-spacing:0.1em;
    margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.07); }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .detail-item .d-lbl { font-size:11px; color:var(--slate); margin-bottom:3px; }
  .detail-item .d-val { font-size:14px; color:var(--white); font-weight:500; line-height:1.5; }
  .detail-item.full { grid-column:1/-1; }
  .items-tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .items-tbl th { font-size:11px; color:var(--slate); text-align:left; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
  .items-tbl td { padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.85); }
  .items-tbl tfoot td { border-top:2px solid rgba(255,255,255,0.1); border-bottom:none; font-weight:700; padding-top:10px; }
  .status-select { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px;
    padding:9px 12px; font-size:13px; font-family:var(--font); color:var(--white); outline:none; cursor:pointer; flex:1; }
  .btn-update { background:var(--saffron); color:var(--white); border:none; padding:9px 18px; border-radius:8px;
    font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap; }
  .btn-update:hover { background:#d05a14; }
  .btn-wa-modal { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:var(--green);
    color:#fff; border:none; padding:12px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer;
    font-family:var(--font); text-decoration:none; transition:all .2s; margin-top:16px; }
  .btn-wa-modal:hover { background:#16a34a; }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; background:rgba(11,31,75,0.97); border:1px solid rgba(232,103,26,0.3);
    border-radius:10px; padding:12px 18px; font-size:13px; color:var(--white); z-index:999; display:flex; align-items:center;
    gap:8px; box-shadow:0 8px 32px rgba(0,0,0,0.45); transform:translateY(80px); opacity:0;
    transition:all .3s cubic-bezier(.4,0,.2,1); pointer-events:none; max-width:320px; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { border-color:rgba(239,68,68,0.4); }

  @media(max-width:768px){
    .admin-main{padding:14px;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .detail-grid{grid-template-columns:1fr;}
    table{font-size:12px;}
    td{padding:9px 10px;}
    thead th{padding:9px 10px;}
    .admin-user{display:none;}
  }
</style>
</head>
<body>

<!-- ━━━ LOGIN SCREEN ━━━ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">HC</div>
    <h1>Admin Panel</h1>
    <p class="login-sub">Harsh CSC eMitra — Secure Access</p>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="admin@example.com" autocomplete="email"/>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" class="form-input" id="loginPwd" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">🔐 Login to Admin Panel</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ━━━ ADMIN DASHBOARD ━━━ -->
<div id="adminPanel">

  <!-- Header -->
  <div class="admin-header">
    <div class="admin-brand">
      <div class="admin-logo-sm">HC</div>
      <div>
        <div class="admin-title">
          Harsh CSC eMitra — Admin
          <span class="live"><span class="realtime-dot"></span> Live Updates</span>
        </div>
      </div>
    </div>
    <div class="admin-header-right">
      <span class="admin-user" id="adminEmail">—</span>
      <a href="/" class="btn-sm" target="_blank">🌐 Site</a>
      <button class="btn-sm danger" onclick="handleLogout()">🔒 Logout</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(59,130,246,0.15)">📦</div>
        <div><div class="stat-val" id="sTotal">—</div><div class="stat-lbl">Total Orders</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(245,166,35,0.15)">💰</div>
        <div><div class="stat-val" id="sRevenue">—</div><div class="stat-lbl">Revenue (Completed)</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(232,103,26,0.15)">⏳</div>
        <div><div class="stat-val" id="sPending">—</div><div class="stat-lbl">Pending Orders</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(34,197,94,0.12)">📅</div>
        <div><div class="stat-val" id="sToday">—</div><div class="stat-lbl">Today's Orders</div></div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="search" class="search-input" id="searchBox"
        placeholder="🔍  Name, phone, order ref se search karein..."
        oninput="applyFilters()"/>
      <select class="filter-select" id="statusBox" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="new">🆕 New</option>
        <option value="processing">⚙️ Processing</option>
        <option value="completed">✅ Completed</option>
        <option value="cancelled">❌ Cancelled</option>
      </select>
      <select class="filter-select" id="dateBox" onchange="applyFilters()">
        <option value="">All Time</option>
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
      </select>
      <button class="btn-action ghost" onclick="loadOrders()">🔄 Refresh</button>
      <button class="btn-action ghost" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order Ref</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Items</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="8"><div class="table-state"><div class="state-icon">⏳</div><p>Loading orders...</p></div></td></tr>
        </tbody>
      </table>
    </div>

  </div><!-- /admin-main -->
</div><!-- /adminPanel -->

<!-- ━━━ ORDER DETAIL MODAL ━━━ -->
<div class="modal-bg" id="orderModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-ref-text" id="mRef">HSC-XXXXXX</div>
        <div class="modal-title-text">Order Details</div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     ⚙️  CONFIG — Supabase credentials yahan fill karo
         (same values jo index.html mein daale hain)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const SUPABASE_URL  = 'https://qhqvmzrdncxddzlfrgrn.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocXZtenJkbmN4ZGR6bGZyZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTg4MzYsImV4cCI6MjA5MjE3NDgzNn0.pZXICNxjcTo8v654L0ezIyerJ_GKj3Of-rTBKlH9bFc';
  const WA_NUM        = '917023029903';             // ✅ already correct

  /* ━━━ INIT ━━━ */
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  let allOrders   = [];
  let currentUser = null;
  let rtChannel   = null;

  /* ━━━ LOGIN ━━━ */
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd   = document.getElementById('loginPwd').value.trim();
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('loginError');

    if (!email || !pwd) { showLoginErr('Email aur password daalo.'); return; }
    btn.textContent = '⏳ Logging in...';
    btn.disabled = true;
    err.style.display = 'none';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) {
      showLoginErr('Login failed: ' + (error.message || 'Invalid credentials'));
      btn.textContent = '🔐 Login to Admin Panel';
      btn.disabled = false;
      return;
    }
    currentUser = data.user;
    enterPanel();
  }

  function showLoginErr(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('loginBtn').textContent = '🔐 Login to Admin Panel';
    document.getElementById('loginBtn').disabled = false;
  }

  /* ━━━ LOGOUT ━━━ */
  async function handleLogout() {
    if (rtChannel) sb.removeChannel(rtChannel);
    await sb.auth.signOut();
    allOrders = [];
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginPwd').value = '';
  }

  /* ━━━ SHOW PANEL ━━━ */
  function enterPanel() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'block';
    document.getElementById('adminEmail').textContent    = currentUser?.email || '';
    loadOrders();
    startRealtime();
  }

  /* ━━━ FETCH ORDERS ━━━ */
  async function loadOrders() {
    setTableState('⏳', 'Orders load ho rahi hain...');

    const { data, error } = await sb
      .from('orders')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(500);

    if (error) {
      setTableState('❌', `Error: ${error.message}`);
      showToast('❌ Fetch failed. Retry karein.', true);
      return;
    }

    allOrders = data || [];
    calcStats();
    applyFilters();
  }

  /* ━━━ STATS ━━━ */
  function calcStats() {
    const today   = new Date().toDateString();
    const revenue = allOrders.filter(o => o.status === 'completed')
                             .reduce((s,o) => s + (Number(o.total_amount)||0), 0);
    document.getElementById('sTotal').textContent   = allOrders.length;
    document.getElementById('sRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');
    document.getElementById('sPending').textContent = allOrders.filter(o => o.status === 'new' || o.status === 'processing').length;
    document.getElementById('sToday').textContent   = allOrders.filter(o => new Date(o.created_at).toDateString() === today).length;
  }

  /* ━━━ FILTER + RENDER ━━━ */
  function applyFilters() {
    const q      = document.getElementById('searchBox').value.toLowerCase();
    const status = document.getElementById('statusBox').value;
    const range  = document.getElementById('dateBox').value;

    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const week  = new Date(today); week.setDate(today.getDate() - 7);
    const month = new Date(today); month.setDate(today.getDate() - 30);

    const filtered = allOrders.filter(o => {
      const d = new Date(o.created_at);
      if (q && !(
        o.customer_name?.toLowerCase().includes(q) ||
        o.customer_phone?.includes(q) ||
        o.order_ref?.toLowerCase().includes(q) ||
        o.customer_email?.toLowerCase().includes(q)
      )) return false;
      if (status && o.status !== status) return false;
      if (range === 'today' && d < today) return false;
      if (range === 'week'  && d < week)  return false;
      if (range === 'month' && d < month) return false;
      return true;
    });

    renderTable(filtered);
  }

  function renderTable(orders) {
    const body = document.getElementById('ordersBody');
    if (!orders.length) {
      setTableState('📭', 'Koi order nahi mila');
      return;
    }
    body.innerHTML = orders.map(o => {
      const items  = Array.isArray(o.items) ? o.items : [];
      const iStr   = items.map(i => `${i.emoji||''} ${i.name} ×${i.qty}`).join(', ') || '—';
      const amt    = o.total_amount ? '₹'+Number(o.total_amount).toLocaleString('en-IN') : '—';
      const st     = o.status || 'new';
      const dt     = o.created_at ? new Date(o.created_at).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
      return `
        <tr onclick="openOrder('${o.id}')">
          <td class="td-ref">${o.order_ref||'—'}</td>
          <td class="td-name">${o.customer_name||'—'}</td>
          <td class="td-phone"><a href="tel:+91${o.customer_phone}" onclick="event.stopPropagation()">${o.customer_phone||'—'}</a></td>
          <td class="td-items" title="${iStr}">${iStr}</td>
          <td class="td-amount">${amt}</td>
          <td><span class="badge badge-${st}">${stLabel(st)}</span></td>
          <td class="td-date">${dt}</td>
          <td>
            <div class="action-btns" onclick="event.stopPropagation()">
              <button class="btn-icon wa" title="WhatsApp" onclick="quickWA('${o.customer_phone}','${o.customer_name}','${o.order_ref}')">📲</button>
              <button class="btn-icon" title="View Details" onclick="openOrder('${o.id}')">👁</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function setTableState(icon, msg) {
    document.getElementById('ordersBody').innerHTML =
      `<tr><td colspan="8"><div class="table-state"><div class="state-icon">${icon}</div><p>${msg}</p></div></td></tr>`;
  }

  /* ━━━ ORDER DETAIL MODAL ━━━ */
  function openOrder(id) {
    const o = allOrders.find(x => String(x.id) === String(id));
    if (!o) return;

    document.getElementById('mRef').textContent = o.order_ref || '—';

    const items = Array.isArray(o.items) ? o.items : [];
    const rows  = items.map(i => `
      <tr>
        <td>${i.emoji||''} ${i.name||'—'}</td>
        <td style="text-align:center">${i.qty||1}</td>
        <td style="text-align:right;color:rgba(255,255,255,0.6)">₹${(Number(i.price)||0).toLocaleString('en-IN')}</td>
        <td style="text-align:right;color:var(--gold);font-weight:700">₹${((Number(i.price)||0)*(Number(i.qty)||1)).toLocaleString('en-IN')}</td>
      </tr>`).join('');

    const waText = encodeURIComponent(
      `Hello ${o.customer_name}! 👋\n\nYe Harsh CSC eMitra ki taraf se hai.\nAapka order *${o.order_ref}* humein mil gaya hai.\n\nHum jald hi aapko call karenge. Koi sawaal ho to yahan poochh sakte hain. 🙏`
    );

    document.getElementById('mBody').innerHTML = `
      <div class="detail-sec">
        <div class="detail-sec-title">Customer Information</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="d-lbl">Full Name</div><div class="d-val">${o.customer_name||'—'}</div></div>
          <div class="detail-item"><div class="d-lbl">Mobile</div><div class="d-val"><a href="tel:+91${o.customer_phone}" style="color:#60a5fa;text-decoration:none">📞 ${o.customer_phone||'—'}</a></div></div>
          <div class="detail-item"><div class="d-lbl">Email</div><div class="d-val">${o.customer_email||'—'}</div></div>
          <div class="detail-item"><div class="d-lbl">Date & Time</div><div class="d-val">${o.created_at?new Date(o.created_at).toLocaleString('en-IN'):'—'}</div></div>
          <div class="detail-item full"><div class="d-lbl">Delivery Address</div><div class="d-val">${o.delivery_address||'—'}</div></div>
          ${o.notes?`<div class="detail-item full"><div class="d-lbl">Notes</div><div class="d-val">${o.notes}</div></div>`:''}
        </div>
      </div>

      <div class="detail-sec">
        <div class="detail-sec-title">Items Ordered</div>
        <table class="items-tbl">
          <thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Rate</th><th style="text-align:right">Total</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="4" style="color:var(--slate)">No items</td></tr>'}</tbody>
          <tfoot><tr>
            <td colspan="3" style="color:var(--slate);font-size:12px">Grand Total</td>
            <td style="text-align:right;color:var(--gold)">₹${(Number(o.total_amount)||0).toLocaleString('en-IN')}</td>
          </tr></tfoot>
        </table>
      </div>

      <div class="detail-sec">
        <div class="detail-sec-title">Update Order Status</div>
        <div style="display:flex;gap:10px;align-items:center">
          <select class="status-select" id="mStatusSel">
            <option value="new"        ${o.status==='new'?'selected':''}>🆕 New</option>
            <option value="processing" ${o.status==='processing'?'selected':''}>⚙️ Processing</option>
            <option value="completed"  ${o.status==='completed'?'selected':''}>✅ Completed</option>
            <option value="cancelled"  ${o.status==='cancelled'?'selected':''}>❌ Cancelled</option>
          </select>
          <button class="btn-update" onclick="doUpdateStatus('${o.id}')">Save →</button>
        </div>
      </div>

      <a href="https://wa.me/${WA_NUM}?text=${waText}" target="_blank" class="btn-wa-modal">
        📲 WhatsApp Customer — ${o.customer_name}
      </a>`;

    document.getElementById('orderModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('orderModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ━━━ UPDATE STATUS ━━━ */
  async function doUpdateStatus(id) {
    const newSt = document.getElementById('mStatusSel').value;
    const { error } = await sb.from('orders').update({ status: newSt }).eq('id', id);
    if (error) { showToast('❌ Update failed: ' + error.message, true); return; }
    const idx = allOrders.findIndex(o => String(o.id) === String(id));
    if (idx !== -1) allOrders[idx].status = newSt;
    calcStats(); applyFilters(); closeModal();
    showToast(`✅ Status updated → ${stLabel(newSt)}`);
  }

  /* ━━━ QUICK WA ━━━ */
  function quickWA(phone, name, ref) {
    const msg = encodeURIComponent(`Hello ${name}! 👋\nYe Harsh CSC eMitra se hai, order *${ref}* ke baare mein.\n\nAapka order process ho raha hai. Koi sawaal ho to batayein. 🙏`);
    window.open(`https://wa.me/91${phone}?text=${msg}`, '_blank');
  }

  /* ━━━ REAL-TIME ━━━ */
  function startRealtime() {
    rtChannel = sb.channel('admin-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'orders' }, payload => {
        if (payload.eventType === 'INSERT') {
          allOrders.unshift(payload.new);
          showToast('🆕 Naya order aaya! ' + payload.new.order_ref);
          // Notification sound via Web Audio API
          try {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.frequency.value = 800;
            osc.start(); osc.stop(ctx.currentTime + 0.15);
          } catch(e) {}
        } else if (payload.eventType === 'UPDATE') {
          const i = allOrders.findIndex(o => o.id === payload.new.id);
          if (i !== -1) allOrders[i] = payload.new;
        } else if (payload.eventType === 'DELETE') {
          allOrders = allOrders.filter(o => o.id !== payload.old.id);
        }
        calcStats(); applyFilters();
      })
      .subscribe();
  }

  /* ━━━ EXPORT CSV ━━━ */
  function exportCSV() {
    const headers = ['Order Ref','Name','Phone','Email','Address','Items','Total','Status','Date'];
    const rows = allOrders.map(o => [
      o.order_ref, o.customer_name, o.customer_phone, o.customer_email||'',
      (o.delivery_address||'').replace(/\n/g,' '),
      (Array.isArray(o.items) ? o.items.map(i=>`${i.name}x${i.qty}`).join('|') : ''),
      o.total_amount, o.status,
      o.created_at ? new Date(o.created_at).toLocaleString('en-IN') : ''
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
    const a    = Object.assign(document.createElement('a'), { href:URL.createObjectURL(blob), download:`harsh-csc-orders-${new Date().toISOString().slice(0,10)}.csv` });
    a.click(); URL.revokeObjectURL(a.href);
    showToast('📥 CSV exported!');
  }

  /* ━━━ HELPERS ━━━ */
  function stLabel(s) {
    return {new:'🆕 New', processing:'⚙️ Processing', completed:'✅ Done', cancelled:'❌ Cancelled'}[s] || s;
  }

  function showToast(msg, isErr=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (isErr?' error':'');
    clearTimeout(t._to);
    t._to = setTimeout(() => t.classList.remove('show'), 4000);
  }

  /* ━━━ KEYBOARD SHORTCUTS ━━━ */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') handleLogin();
  });

  /* ━━━ AUTO-LOGIN if session exists ━━━ */
  sb.auth.getSession().then(({ data }) => {
    if (data?.session?.user) {
      currentUser = data.session.user;
      enterPanel();
    }
  });
</script>
</body>
</html>
