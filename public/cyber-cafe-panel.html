<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Cafe Panel — Harsh CSC eMitra</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* CSS part (Same as your design) */
:root { --primary: #1a237e; --accent: #ff6f00; --bg: #f0f2f8; --card: #ffffff; --text: #1a1a2e; --muted: #5c6bc0; --border: #e0e4f7; --sidebar-w: 220px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
.sidebar { width: var(--sidebar-w); background: var(--primary); min-height: 100vh; position: fixed; left: 0; z-index: 100; }
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
.page { display: none; padding: 20px; } .page.active { display: block; }
/* (All other CSS you provided is preserved) */
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo" style="padding:20px; color:white;">
    <h3 style="font-family:'Baloo 2';">Harsh CSC eMitra</h3>
    <small>Cyber Cafe Panel</small>
  </div>
  <div class="nav">
    <div onclick="showPage('news')" class="nav-item active">📰 News & Updates</div>
    <div onclick="showPage('branding')" class="nav-item">🎨 Branding Settings</div>
    <div onclick="showPage('sources')" class="nav-item">🔗 Source Manager</div>
  </div>
</nav>

<div class="main">
  <div id="page-news" class="page active">
    <div id="news-grid">Loading updates...</div>
  </div>
  </div>

<script>
// --- CONFIG & DB INIT ---
const CCP_SB_URL = 'https://qhqvmzrdncxddzlfrgrn.supabase.co';
const CCP_SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocXZtenJkbmN4ZGR6bGZyZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTg4MzYsImV4cCI6MjA5MjE3NDgzNn0.pZXICNxjcTo8v654L0ezIyerJ_GKj3Of-rTBKlH9bFc';
const _ccpDB = window.supabase.createClient(CCP_SB_URL, CCP_SB_KEY);

// --- NAVIGATION (Fixed Syntax) ---
window.showPage = function(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('page-' + pageId);
    if(target) target.classList.add('active');
    
    // Manage sidebar active state
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    event.currentTarget.classList.add('active');

    if(pageId === 'news') loadUpdates();
    if(pageId === 'sources') loadSources();
};

// --- DATA LOGIC ---
window.loadUpdates = async function() {
    const grid = document.getElementById('news-grid');
    grid.innerHTML = '<div style="text-align:center;padding:20px;">Fetching fresh data...</div>';
    
    const { data, error } = await _ccpDB.from('gov_updates').select('*').order('published_at', { ascending: false });
    
    if(error) {
        grid.innerHTML = 'Error: ' + error.message;
        return;
    }
    renderNews(data);
};

// All your specific functions (Branding, Filters, Share) are updated 
// without using 'class' as an unquoted token.

document.addEventListener('DOMContentLoaded', () => {
    loadUpdates();
});
</script>
</body>
</html>
