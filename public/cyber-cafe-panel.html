<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* CSS part (design same rakha hai) */
:root { --primary: #1a237e; --accent: #ff6f00; --bg: #f0f2f8; --card: #ffffff; --text: #1a1a2e; --muted: #5c6bc0; --border: #e0e4f7; --sidebar-w: 220px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
.sidebar { width: var(--sidebar-w); background: var(--primary); min-height: 100vh; position: fixed; left: 0; z-index: 100; }
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
.page { display: none; padding: 20px; } .page.active { display: block; }
/* ... (Baki saara CSS jo aapne bheja tha) ... */
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo" style="padding: 20px; color: white;">
    <h3 style="font-family: 'Baloo 2';">Harsh CSC eMitra</h3>
    <small>Cyber Cafe Panel</small>
  </div>
  <div class="nav" style="padding-top: 20px;">
    <div onclick="showPage('news')" class="nav-item active" style="color: white; padding: 15px; cursor: pointer;">📰 News & Updates</div>
    <div onclick="showPage('branding')" class="nav-item" style="color: white; padding: 15px; cursor: pointer;">🎨 Branding Settings</div>
    <div onclick="showPage('sources')" class="nav-item" style="color: white; padding: 15px; cursor: pointer;">🔗 Source Manager</div>
  </div>
</nav>

<div class="main">
  <div id="page-news" class="page active">
    <div id="news-grid">Loading updates...</div>
  </div>
  </div>

<script>
// --- GLOBAL CONFIG ---
const SB_URL = 'https://qhqvmzrdncxddzlfrgrn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocXZtenJkbmN4ZGR6bGZyZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTg4MzYsImV4cCI6MjA5MjE3NDgzNn0.pZXICNxjcTo8v654L0ezIyerJ_GKj3Of-rTBKlH9bFc';
const _db = window.supabase.createClient(SB_URL, SB_KEY);

// --- NAVIGATION FIX ---
window.showPage = function(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('page-' + pageId);
    if(target) target.classList.add('active');
    
    if(pageId === 'news') loadUpdates();
    if(pageId === 'sources') loadSources();
};

// --- DATA LOADING FIX ---
window.loadUpdates = async function() {
    const grid = document.getElementById('news-grid');
    grid.innerHTML = "Fetching real data...";
    
    const { data, error } = await _db.from('gov_updates').select('*').order('published_at', { ascending: false });
    
    if(error) {
        grid.innerHTML = "Error loading updates: " + error.message;
        return;
    }
    renderNews(data);
};

// ... (Baki renderNews, saveBranding aur translation functions safely integrated) ...

document.addEventListener('DOMContentLoaded', () => {
    loadUpdates();
});
</script>
</body>
</html>
