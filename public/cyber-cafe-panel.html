<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Cafe Panel — Harsh CSC eMitra</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* CSS part (Preserving your design) */
:root { --primary: #1a237e; --accent: #ff6f00; --bg: #f0f2f8; --card: #ffffff; --text: #1a1a2e; --border: #e0e4f7; --sidebar-w: 220px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans', sans-serif; background: var(--bg); display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); background: var(--primary); position: fixed; height: 100vh; z-index: 100; }
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
.page { display: none; padding: 20px; } .page.active { display: block; }
.nav-item { padding: 12px 20px; color: #fff; cursor: pointer; opacity: 0.8; transition: 0.3s; }
.nav-item.active, .nav-item:hover { opacity: 1; background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<nav class="sidebar">
  <div style="padding:20px; border-bottom:1px solid rgba(255,255,255,0.1);">
    <h3 style="color:#fff; font-family:'Baloo 2';">Harsh CSC</h3>
    <small style="color:rgba(255,255,255,0.5);">Cyber Cafe Panel</small>
  </div>
  <div class="nav">
    <div onclick="window.showPage('news')" class="nav-item active" id="nav-news">📰 News & Updates</div>
    <div onclick="window.showPage('branding')" class="nav-item" id="nav-branding">🎨 Branding Settings</div>
    <div onclick="window.showPage('sources')" class="nav-item" id="nav-sources">🔗 Source Manager</div>
  </div>
</nav>

<div class="main">
  <div id="page-news" class="page active">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>📰 News Updates</h2>
        <button onclick="window.loadUpdates()" style="padding:8px 15px; cursor:pointer;">🔄 Refresh</button>
    </div>
    <div id="news-grid">Loading updates...</div>
  </div>

  <div id="page-branding" class="page">
    <h2>🎨 Branding Settings</h2>
    <div style="background:#fff; padding:20px; border-radius:10px; margin-top:15px;">
        <p>Apni details yahan save karein...</p>
        <button onclick="window.saveBranding()" style="margin-top:10px; padding:10px 20px; background:var(--primary); color:#fff; border:none; border-radius:5px; cursor:pointer;">💾 Save Details</button>
    </div>
  </div>

  <div id="page-sources" class="page">
    <h2>🔗 Source Manager</h2>
    <div id="sources-list" style="margin-top:15px;">Loading sources...</div>
  </div>
</div>

<script>
// --- CONFIG ---
const SB_URL = 'https://qhqvmzrdncxddzlfrgrn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocXZtenJkbmN4ZGR6bGZyZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTg4MzYsImV4cCI6MjA5MjE3NDgzNn0.pZXICNxjcTo8v654L0ezIyerJ_GKj3Of-rTBKlH9bFc';
const _db = window.supabase.createClient(SB_URL, SB_KEY);

// --- CORE FUNCTIONS (Attached to window for global access) ---
window.showPage = function(pageId) {
    // Pages toggle
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('page-' + pageId);
    if(target) target.classList.add('active');

    // Nav toggle
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + pageId).classList.add('active');

    if(pageId === 'news') window.loadUpdates();
    if(pageId === 'sources') window.loadSources();
};

window.loadUpdates = async function() {
    const grid = document.getElementById('news-grid');
    grid.innerHTML = "Fetching real data...";
    try {
        const { data, error } = await _db.from('gov_updates').select('*').order('published_at', { ascending: false });
        if(error) throw error;
        grid.innerHTML = data.length ? "Updates found: " + data.length : "No updates found.";
        // News rendering logic yahan aayega
    } catch(e) {
        grid.innerHTML = "Error: " + e.message;
    }
};

window.saveBranding = function() {
    alert("Branding features active!");
    // Branding logic
};

window.loadSources = function() {
    document.getElementById('sources-list').innerHTML = "Sources logic loading...";
};

// --- INITIALIZE ---
document.addEventListener('DOMContentLoaded', () => {
    window.showPage('news');
});
</script>
</body>
</html>
